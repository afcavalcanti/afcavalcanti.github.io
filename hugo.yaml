    title: "Sobre Mim"
    image: "/images/me.jpg"
    content: |-
      Sou Engenheiro Mecânico com Mestrado em Ciência, Tecnologia e Inovação pela UFRN,
      onde pesquisei sistemas autônomos de manutenção baseados em IA. Ao longo dos anos gerenciei
      contratos de manutenção em empresas como Implasverde e Nordeste Fruit, transformando dor
      operacional em software.

      Fundei a [Soluções Integradas](https://solucoesintegradas.com.br) para entregar soluções
      completas de gestão industrial — da estratégia e implementação de Lean ao desenvolvimento
      de software personalizado. Meus projetos vão de um CMMS em nuvem (ManOS) a uma plataforma
      de gestão financeira (SOFIN) e ferramentas de compras para o varejo.
    skills:
