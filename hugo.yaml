    params:
      hero:
        intro: "Hi, I'm"
        title: "André Cavalcanti."
        subtitle: "I build software that solves real industrial problems"
        content: |-
          Mechanical Engineer and software developer.
          I combine hands-on field experience in industrial management with AI and full-stack development
          to create tools that actually get used on the shop floor.
        button:
          name: "Resume"
          url: "/en/resume.pdf"
          download: true
          newPage: false
      about:
        title: "About Me"
        content: |-
          I'm a Mechanical Engineer with a Master's degree in Science, Technology and Innovation from UFRN,
          where I researched autonomous AI-driven maintenance systems. I worked as an industrial manager
          in manufacturing and agribusiness companies — and it was on the shop floor that I found the
          problems that later became software.

          Together with my partner Rodrigo Bessa, I co-founded [Soluções Integradas](https://solucoesintegradas.com.br).
          Every product we built started as a real pain point that I or Rodrigo experienced ourselves: ManOS
          came from the struggle of managing maintenance without a proper system, SOFIN from the lack of
          accessible financial control for SMEs. We build tools we actually use.
        skills:
          enable: false
      experience:
        items:
          - company: "Soluções Integradas"
            companyUrl: "https://solucoesintegradas.com.br"
            jobs:
              - name: "Managing Partner"
                date: "Oct 2025 - Present"
                content: |-
                  Responsible for strategic, administrative and financial management, as well as
                  coordinating software development and defining the technical roadmap.
          - company: "Nordeste Fruit"
            companyUrl: "https://nordestefruit.com/"
            jobs:
              - name: "Industrial Manager"
                date: "May 2025 - Sep 2025"
                content: |-
                  Responsible for managing and developing a team of 30 multifunctional professionals.
                  Process optimization strategies resulted in significant improvements in energy
                  efficiency, reduction of raw material losses and minimization of factory operating
                  costs, contributing directly to the company's financial results.
          - company: "Implasverde"
            companyUrl: "https://implasverde.ind.br/"
            jobs:
              - name: "Industrial Manager"
                date: "Jan 2022 - Apr 2025"
                content: |-
                  Managed a cross-functional team of 160 employees across production and support
                  sectors. Strategies implemented resulted in production and process optimization,
                  aligned with corporate objectives.
              - name: "Maintenance Supervisor"
                date: "Nov 2020 - Dec 2021"
                content: |-
                  Led a team of 10 professionals in the successful implementation of Maintenance
                  Planning and Control (PCM). Strategic actions resulted in significant improvements
                  in operational efficiency, cost reduction and productivity increase.
          - company: "Guararapes Confecções"
            companyUrl: "https://ri.riachuelo.com.br/"
            jobs:
              - name: "Intern"
                date: "May 2019 - Apr 2020"
                content: |-
                  Developed and implemented a unified database for production reporting in the
                  automated cutting sector, providing accurate real-time operational performance
                  analysis. Created KPI dashboards that supported strategic decision-making.
          - company: "ECT - UFRN"
            companyUrl: "https://ufrn.br"
            jobs:
              - name: "Researcher · Coordinator"
                date: "2016 - 2018"
                content: |-
                  Coordinated the NEDGlove project — a computational hardware and software system
                  for use in virtual and interactive motor rehabilitation sessions. The hardware
                  consists of a sensor glove to capture hand movements; the software includes a
                  virtual hand simulator and a glove-controlled game to make physiotherapy sessions
                  more engaging.
          - company: "IMD - UFRN"
            companyUrl: "https://portal.imd.ufrn.br/"
            jobs:
              - name: "Intern · Prototyping Lab"
                date: "Jan 2018 - Apr 2019"
                content: |-
                  Developed electronic and mechanical prototypes for research conducted by
                  UFRN laboratories, working in a multidisciplinary capacity alongside
                  teams from different university departments.
          - company: "CLBI - DCTA"
            companyUrl: "https://www.dcta.mil.br/"
            jobs:
              - name: "Intern · Aerospace Research"
                date: "Aug 2015 - Jan 2016"
                content: |-
                  Worked on the SPACEVANT project — an autonomous aerial vehicle for surveillance
                  and data collection in space mission areas. Developed an automatic cargo transport
                  and launch system attachable to UAVs, expanding the operational capabilities of
                  the Barreira do Inferno Launch Center. Results published at CONEM 2016.
      education:
        items:
          - title: "M.Sc. in Science, Technology and Innovation"
            school:
              name: "Universidade Federal do Rio Grande do Norte (UFRN)"
              url: "https://ufrn.br"
            date: "2023 - 2025"
            content: |-
              Thesis: *Machinery Guardian: Optimizing Maintenance with Artificial Intelligence and Autonomy*

              Extracurricular: developed an unsupervised autonomous maintenance system for wind
              turbine gearboxes using SOM neural networks; project certified by
              [ABS Wind do Brasil](https://abswind.com.br/) in January 2024.
          - title: "B.Eng. in Mechanical Engineering"
            school:
              name: "Universidade Federal do Rio Grande do Norte (UFRN)"
              url: "https://ufrn.br"
            date: "2018 - 2021"
            content: |-
              Final project: *Unsupervised Autonomous Maintenance System Using Artificial Intelligence*

              Extracurricular: coordinated the research project *Detection and Classification of
              Cardiac Diseases in Humans with SOM Neural Networks* — multidisciplinary team of
              five undergraduates, with publication at an international conference (2020–2022).
          - title: "B.Sc. in Science and Technology"
            school:
              name: "Universidade Federal do Rio Grande do Norte (UFRN)"
              url: "https://ufrn.br"
            date: "2012 - 2017"
            content: |-
              Extracurricular: Poti robotics team — developed the kicking mechanism for
              UFRN's robot soccer team; champion in the IEEE Very Small Size category at
              the Brazilian Robotics Competition (2013); hand posture recognition with
              Leap Motion, published at SVR 2017.
      projects:
        items:
          - title: "ManOS"
            content: |-
              Cloud-based Computerized Maintenance Management System (CMMS). Manages work orders,
              assets, preventive schedules, and maintenance KPIs for industrial clients.
            image: /images/projects/manos.png
            featured:
              name: Live App
              link: https://manos-cmms.web.app/
            badges:
              - "React"
              - "Firebase"
              - "TypeScript"
            links:
              - icon: fab fa-github
                url: https://github.com/afcavalcanti/manOS
          - title: "SOFIN"
            content: |-
              Financial management platform for small and medium businesses. Tracks cash flow,
              accounts payable/receivable, and generates management reports.
            image: /images/projects/sofin.png
            featured:
              name: Live App
              link: https://sofin-fms.web.app/
            badges:
              - "React"
              - "Firebase"
              - "JavaScript"
            links:
              - icon: fab fa-github
                url: https://github.com/afcavalcanti/sofin
          - title: "CompraCerta"
            content: |-
              Procurement optimization tool for retail. Automates supplier comparison,
              purchase order generation, and spending analysis.
            image: /images/projects/compracerta.png
            featured:
              name: Live App
              link: https://compra-certa-lilac.vercel.app/login
            badges:
              - "React"
              - "Node.js"
              - "TypeScript"
            links:
              - icon: fab fa-github
                url: https://github.com/afcavalcanti/CompraCerta
          - title: "MeuSeguro+"
            content: |-
              Insurance quotation aggregator. Connects brokers and insurers to generate
              and compare policy quotes across multiple providers in a single workflow.
            image: /images/projects/meuseguro+.png
            featured:
              name: Live App
              link: https://seguro-open.up.railway.app/
            badges:
              - "React"
              - "Node.js"
              - "JavaScript"
            links:
              - icon: fab fa-github
                url: https://github.com/afcavalcanti/openinsurance
      achievements:
        items:
          - title: "Champion — IEEE Very Small Size · Brazilian Robotics Competition"
            content: |-
              Champion in the IEEE Very Small Size category with the Poti team from UFRN
              at the Brazilian Robotics Competition (2013).
            image: /images/achievements/IEEE-VSS.jpg
      contact:
        content: |-
          My inbox is always open. Whether you want to discuss a project, a consulting opportunity,
          or just connect, I'll get back to you as soon as possible.
        btnName: "Email me"
        btnLink: "mailto:contato@solucoesintegradas.com.br"

