    params:
      hero:
        intro: "Hi, I'm"
        title: "André Cavalcanti."
        subtitle: "I build software that solves real industrial problems"
        content: |-
          Mechanical Engineer and software developer based in Natal, Brazil.
          I combine hands-on field experience in industrial maintenance with AI and full-stack development
          to create tools that actually get used on the shop floor.
        button:
          name: "Resume"
          url: "/en/resume.pdf"
          download: true
          newPage: false
      about:
        title: "About Me"
        content: |-
          I'm a Mechanical Engineer with a Master's degree in Science, Technology and Innovation from UFRN,
          where I researched autonomous AI-driven maintenance systems. Over the years I've managed maintenance
          contracts at companies like Implasverde and Nordeste Fruit, translating operational pain into software.

          I founded [Soluções Integradas](https://solucoesintegradas.com.br) to deliver end-to-end industrial
          management solutions — from strategy and Lean implementation to custom software development.
          My projects range from a cloud-based CMMS (ManOS) to a financial management platform (SOFIN)
          and procurement tools for retail.
        skills:
          title: "Technologies I work with:"
      experience:
        items:
          - company: "Soluções Integradas"
            companyUrl: "https://solucoesintegradas.com.br"
            jobs:
              - name: "Founder & Industrial Management Consultant"
                date: "2019 - Present"
                content: |-
                  Founded and run a consultancy specializing in industrial management and custom software development.
                  Clients include manufacturing and agribusiness companies across Rio Grande do Norte.
                  Deliver Lean, PDCA, and maintenance strategy alongside purpose-built software solutions.
          - company: "Implasverde"
            companyUrl: ""
            jobs:
              - name: "Maintenance Manager"
                date: "2019 - 2021"
                content: |-
                  Led maintenance operations for a plastics manufacturer. Introduced structured preventive
                  maintenance routines and KPI tracking, achieving a 33% increase in team productivity and
                  a 17% reduction in maintenance costs over two years.
          - company: "Nordeste Fruit"
            companyUrl: ""
            jobs:
              - name: "Industrial Management Consultant"
                date: "2020 - 2022"
                content: |-
                  Restructured maintenance and supply-chain processes at a fruit processing facility.
                  Eliminated recurring stockouts of critical parts, improved energy efficiency, and
                  reduced material losses through systematic inventory control and preventive planning.
          - company: "Guararapes"
            companyUrl: ""
            jobs:
              - name: "Maintenance Engineer"
                date: "2018 - 2019"
                content: |-
                  Implemented automated production monitoring in the fabric cutting sector,
                  replacing manual tracking with real-time data collection and reporting,
                  enabling faster decision-making and reducing idle time.
          - company: "SPACEVANT / DCTA"
            companyUrl: ""
            jobs:
              - name: "UAV Research Engineer"
                date: "2016 - 2017"
                content: |-
                  Developed a modular cargo transport and release mechanism for unmanned aerial vehicles
                  as part of a research collaboration with Brazil's Department of Aerospace Science and Technology.
      education:
        items:
          - title: "M.Sc. in Science, Technology and Innovation"
            school:
              name: "Universidade Federal do Rio Grande do Norte (UFRN)"
              url: "https://ufrn.br"
            date: "2023 - 2025"
            content: |-
              Thesis: *Machinery Guardian: Optimizing Maintenance with Artificial Intelligence and Autonomy*

              Researched unsupervised AI systems for predictive and autonomous industrial maintenance,
              combining anomaly detection, neural networks, and autonomous decision-making.
          - title: "B.Eng. in Mechanical Engineering"
            school:
              name: "Universidade Federal do Rio Grande do Norte (UFRN)"
              url: "https://ufrn.br"
            date: "2012 - 2017"
            content: |-
              Final project: *Unsupervised Autonomous Maintenance System Using Artificial Intelligence*

              Extracurricular: RoboCIn robotics team (autonomous soccer robot, LARS/SBR 2014),
              UAV research project (CONEM 2016), Leap Motion gesture recognition (SVR 2017).
      projects:
        items:
          - title: "ManOS"
            content: |-
              Cloud-based Computerized Maintenance Management System (CMMS). Manages work orders,
              assets, preventive schedules, and maintenance KPIs for industrial clients.
            image: /images/projects/manos.png
            featured:
              name: Live App
              link: https://manos-cmms.web.app/
            badges:
              - "React"
              - "Firebase"
              - "TypeScript"
            links:
              - icon: fab fa-github
                url: https://github.com/afcavalcanti/manOS
          - title: "SOFIN"
            content: |-
              Financial management platform for small and medium businesses. Tracks cash flow,
              accounts payable/receivable, and generates management reports.
            image: /images/projects/sofin.png
            featured:
              name: Live App
              link: https://sofin-fms.web.app/
            badges:
              - "React"
              - "Firebase"
              - "JavaScript"
            links:
              - icon: fab fa-github
                url: https://github.com/afcavalcanti/sofin
          - title: "CompraCerta"
            content: |-
              Procurement optimization tool for retail. Automates supplier comparison,
              purchase order generation, and spending analysis.
            image: /images/projects/compracerta.png
            badges:
              - "React"
              - "Node.js"
              - "TypeScript"
            links:
              - icon: fab fa-github
                url: https://github.com/afcavalcanti/CompraCerta
          - title: "OpenInsurance"
            content: |-
              Insurance quotation aggregator. Connects brokers and insurers to generate
              and compare policy quotes across multiple providers in a single workflow.
            image: /images/projects/openinsurance.png
            badges:
              - "React"
              - "Node.js"
              - "JavaScript"
            links:
              - icon: fab fa-github
                url: https://github.com/afcavalcanti/openinsurance
      achievements:
        items:
          - title: "IRF2020 — International Conference on Integrity-Reliability-Failure"
            content: |-
              Two papers accepted: detection and classification of water chiller failures
              and bag-making machine failures using artificial neural networks. Funchal, Portugal, 2020.
            image: /images/achievements/irf2020.jpg
          - title: "SVR 2017 — Symposium on Virtual and Augmented Reality"
            content: |-
              Published research on hand posture recognition using Leap Motion controller.
              Curitiba, Brazil, 2017. DOI: 10.1109/SVR.2017.49
            image: /images/achievements/svr2017.jpg
          - title: "CONEM 2016 — National Congress of Mechanical Engineering"
            content: |-
              Published UAV cargo transport and release support system.
              Fortaleza, Brazil, 2016. DOI: 10.20906/CPS/CON-2016-0414
            image: /images/achievements/conem2016.jpg
          - title: "LARS/SBR Robotics Symposium 2014"
            content: |-
              Developed a small wheeled autonomous mobile soccer robot as part of RoboCIn team.
              São Carlos, Brazil, 2014. DOI: 10.1109/SBR.LARS.Robocontrol.2014.33
            image: /images/achievements/lars2014.jpg
      contact:
        content: |-
          My inbox is always open. Whether you want to discuss a project, a consulting opportunity,
          or just connect, I'll get back to you as soon as possible.
        btnName: "Email me"
        btnLink: "mailto:contato@solucoesintegradas.com.br"

