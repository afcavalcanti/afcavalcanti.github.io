          Agregador de cotações de seguros. Conecta corretores e seguradoras para gerar e comparar
          cotações de apólices de múltiplos provedores em um único fluxo de trabalho.
        image: /images/projects/openinsurance.png
        badges:
          - "React"
          - "Node.js"
          - "JavaScript"
        links:
          - icon: fab fa-github
            url: https://github.com/afcavalcanti/openinsurance

