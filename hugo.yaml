              no Rio Grande do Norte. Entrego Lean, PDCA e estratégia de manutenção junto com
              soluções de software sob medida.
      - company: "Implasverde"
        companyUrl: ""
        jobs:
          - name: "Gestor de Manutenção"
            date: "2019 - 2021"
            content: |-
              Liderou as operações de manutenção de um fabricante de plásticos. Implementou rotinas
