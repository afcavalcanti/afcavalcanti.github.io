            date: "2020 - 2022"
            content: |-
              Reestruturou processos de manutenção e cadeia de suprimentos em uma processadora
              de frutas. Eliminou a falta recorrente de peças críticas, melhorou a eficiência
              energética e reduziu perdas de material por meio de controle sistemático de estoque
              e planejamento preventivo.
      - company: "Guararapes"
        companyUrl: ""
        jobs:
