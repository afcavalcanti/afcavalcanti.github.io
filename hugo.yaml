    title: "Sobre Mim"
    content: |-
      Sou Engenheiro Mecânico com Mestrado em Ciência, Tecnologia e Inovação pela UFRN,
      onde pesquisei sistemas autônomos de manutenção com inteligência artificial. Trabalhei
      como gerente industrial em empresas de manufatura e agronegócio, e foi nesse campo que
      identifiquei as dores que mais tarde viraram software.

      Junto com meu sócio Rodrigo Bessa, fundei a [Soluções Integradas](https://solucoesintegradas.com.br).
      Cada produto que desenvolvemos nasceu de um problema real que eu ou Rodrigo enfrentamos: o ManOS
      veio da dificuldade de gerenciar manutenção sem um sistema adequado, o SOFIN da falta de controle
      financeiro acessível para PMEs, e assim por diante. Construímos ferramentas que realmente usamos.
